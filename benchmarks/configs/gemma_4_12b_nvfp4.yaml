axes:
  batch_sizes: [1, 4, 16, 32]
  hit_rates: [0.0, 0.3, 0.6, 0.9]
  spec_k: [0, 1, 2, 3]
  spec_method: draft_model
  eagle_topk: 1
  num_draft_tokens: 4

model:
  name: gemma-4-12b-nvfp4
  hf_id: AxionML/Gemma-4-12B-NVFP4
  spec_methods: [draft_model]
  max_context: 16384
  quantization: nvfp4
  reasoning_parser: null
  tool_call_parser: null
  draft_model: google/gemma-4-12B-it-assistant

engine:
  host: 127.0.0.1
  port: 8000
  enable_lmcache: true
  lmcache_config: lmcache/configs/cpu_only.yaml
  chunked_prefill_size: 4096
  mem_fraction_static: 0.85
  tp_size: 1
  gpu_vram_gb: 32

workload:
  prompt_tokens: 2048
  completion_tokens: 256
  concurrency: 32
  duration_s: 60
  warmup_s: 10

results_dir: results
